spring.application.name=POS_System
# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/pos_system
spring.datasource.username=root
spring.datasource.password=mysql
# 3. The MySQL Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Hibernate Configuration
# 'update' tells Hibernate to automatically create or update your database tables based on your Java code
spring.jpa.hibernate.ddl-auto=update

# This prints the SQL queries Hibernate generates into your console so you can see what it's doing
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tells Hibernate we are specifically using MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect